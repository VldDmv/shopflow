databaseChangeLog:
  - changeSet:
      id: 001-create-notifications-table
      author: shopflow
      changes:
        - createTable:
            tableName: notifications
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: order_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: message
                  type: VARCHAR(500)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
        - createIndex:
            indexName: idx_notifications_user_id
            tableName: notifications
            columns:
              - column:
                  name: user_id
        - createIndex:
            indexName: idx_notifications_order_id
            tableName: notifications
            columns:
              - column:
                  name: order_id