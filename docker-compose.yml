version: '3.8'

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: shopflow-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: shopflow-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  postgres-users:
    image: postgres:16-alpine
    container_name: shopflow-postgres-users
    environment:
      POSTGRES_DB: users_db
      POSTGRES_USER: shopflow
      POSTGRES_PASSWORD: shopflow
    ports:
      - "5433:5432"
    volumes:
      - users-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shopflow -d users_db"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres-orders:
    image: postgres:16-alpine
    container_name: shopflow-postgres-orders
    environment:
      POSTGRES_DB: orders_db
      POSTGRES_USER: shopflow
      POSTGRES_PASSWORD: shopflow
    ports:
      - "5434:5432"
    volumes:
      - orders-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shopflow -d orders_db"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres-notifications:
    image: postgres:16-alpine
    container_name: shopflow-postgres-notifications
    environment:
      POSTGRES_DB: notifications_db
      POSTGRES_USER: shopflow
      POSTGRES_PASSWORD: shopflow
    ports:
      - "5435:5432"
    volumes:
      - notifications-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shopflow -d notifications_db"]
      interval: 5s
      timeout: 3s
      retries: 5

  eureka-server:
    build: ./eureka-server
    container_name: shopflow-eureka
    ports:
      - "8761:8761"

  user-service:
    build: ./user-service
    container_name: shopflow-user-service
    ports:
      - "8081:8081"
    restart: on-failure
    depends_on:
      postgres-users:
        condition: service_healthy
      eureka-server:
        condition: service_started
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-users:5432/users_db
      SPRING_DATASOURCE_USERNAME: shopflow
      SPRING_DATASOURCE_PASSWORD: shopflow
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/

  order-service:
    build: ./order-service
    container_name: shopflow-order-service
    ports:
      - "8082:8082"
    restart: on-failure
    depends_on:
      postgres-orders:
        condition: service_healthy
      eureka-server:
        condition: service_started
      kafka:
        condition: service_started
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-orders:5432/orders_db
      SPRING_DATASOURCE_USERNAME: shopflow
      SPRING_DATASOURCE_PASSWORD: shopflow
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092

  notification-service:
    build: ./notification-service
    container_name: shopflow-notification-service
    ports:
      - "8083:8083"
    restart: on-failure
    depends_on:
      postgres-notifications:
        condition: service_healthy
      eureka-server:
        condition: service_started
      kafka:
        condition: service_started
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-notifications:5432/notifications_db
      SPRING_DATASOURCE_USERNAME: shopflow
      SPRING_DATASOURCE_PASSWORD: shopflow
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092

  api-gateway:
    build: ./api-gateway
    container_name: shopflow-api-gateway
    ports:
      - "8080:8080"
    restart: on-failure
    depends_on:
      - eureka-server
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/

  prometheus:
    image: prom/prometheus:v2.50.1
    container_name: shopflow-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - user-service
      - order-service
      - notification-service

  grafana:
    image: grafana/grafana:10.4.2
    container_name: shopflow-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

volumes:
  users-data:
  orders-data:
  notifications-data:
  grafana-data: